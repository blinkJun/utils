<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>百分比饼图</title>
    <style>
        .pie{
            width:200px;
            height:200px;
            border-radius: 50%;
            overflow: hidden;
            background-color: #eee;
        }
        .pie-left,.pie-right{
            width:50%;
            height:100%;
            float:left;
            position: relative;
            overflow: hidden;
        }
        .pie-left::before,
        .pie-right::before,
        .pie-right::after{
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background-color: teal;
        }
        .pie-left::before{
            left: 100%;
            transform-origin: left;
            transform: rotate(calc(3.6deg * (var(--percent) - 50)));
            opacity: calc(99999 * (var(--percent) - 50));
        }
        .pie-right::before{
            right: 100%;
            transform-origin: right;
            transform: rotate(calc(3.6deg * var(--percent)));
        }
        .pie-right::after{
            opacity: calc(99999 * (var(--percent) - 50));
        }
    </style>
</head>
<body>
    <div class="pie" style="--percent:50" >
        <div class="pie-left" ></div>
        <div class="pie-right" ></div>
    </div>
</body>
</html>
